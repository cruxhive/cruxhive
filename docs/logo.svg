<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" fill="none" aria-label="CruxHive">
  <!-- outer hexagon (hive cell) -->
  <path d="M32 4 L57 18.5 L57 45.5 L32 60 L7 45.5 L7 18.5 Z"
        stroke="currentColor" stroke-width="2.4" stroke-linejoin="round"/>
  <!-- connections from center to each outer node (graph metaphor: AI tools → CruxHive) -->
  <g stroke="currentColor" stroke-width="1" opacity="0.45">
    <line x1="32" y1="32" x2="32" y2="15"/>
    <line x1="32" y1="32" x2="47" y2="23"/>
    <line x1="32" y1="32" x2="47" y2="41"/>
    <line x1="32" y1="32" x2="32" y2="49"/>
    <line x1="32" y1="32" x2="17" y2="41"/>
    <line x1="32" y1="32" x2="17" y2="23"/>
  </g>
  <!-- 6 outer nodes (each AI tool) -->
  <circle cx="32" cy="15" r="2.5" fill="currentColor"/>
  <circle cx="47" cy="23" r="2.5" fill="currentColor"/>
  <circle cx="47" cy="41" r="2.5" fill="currentColor"/>
  <circle cx="32" cy="49" r="2.5" fill="currentColor"/>
  <circle cx="17" cy="41" r="2.5" fill="currentColor"/>
  <circle cx="17" cy="23" r="2.5" fill="currentColor"/>
  <!-- center node (CruxHive itself) — larger, filled disc to anchor the eye -->
  <circle cx="32" cy="32" r="4.5" fill="currentColor"/>
</svg>
