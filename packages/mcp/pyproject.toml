[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "cruxhive-mcp"
version = "0.10.1"
description = "CruxHive MCP server — team AI knowledge governance layer"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.11"
keywords = ["mcp", "ai", "knowledge", "context", "llm", "claude", "cursor"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries",
]
dependencies = [
    "mcp>=1.0.0",
]

[project.optional-dependencies]
full = [
    "sentence-transformers>=2.7.0",
    "sqlite-vec>=0.1.6",
]
ui = [
    "fastapi>=0.100.0",
    "uvicorn>=0.20.0",
    "pydantic>=2.0.0",
]
dev = [
    "pytest>=8.0.0",
]
all = [
    "cruxhive-mcp[full]",
    "cruxhive-mcp[ui]",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]

[project.urls]
Homepage = "https://cruxhive.com"
Repository = "https://github.com/cruxhive/cruxhive"
Documentation = "https://github.com/cruxhive/cruxhive#readme"

[project.scripts]
cruxhive-mcp     = "cruxhive_mcp.server:main"
cruxhive-index   = "cruxhive_mcp.cli:index"
cruxhive-propose = "cruxhive_mcp.cli:propose"
cruxhive-review  = "cruxhive_mcp.cli:review"
cruxhive-approve = "cruxhive_mcp.cli:approve"
cruxhive-reject  = "cruxhive_mcp.cli:reject"
cruxhive-search  = "cruxhive_mcp.cli:search"
cruxhive-stats   = "cruxhive_mcp.cli:stats"
cruxhive-digest  = "cruxhive_mcp.cli:digest"
cruxhive-status  = "cruxhive_mcp.cli:status"
cruxhive-doctor  = "cruxhive_mcp.cli:doctor"
cruxhive-workspace = "cruxhive_mcp.cli:workspace"
cruxhive-ui      = "cruxhive_mcp.cli:ui"
cruxhive-direnv  = "cruxhive_mcp.cli:direnv"

[tool.hatch.build.targets.wheel]
packages = ["cruxhive_mcp"]
# cruxhive_mcp/static/guide.html is bundled automatically because it lives
# inside the package dir. Source of truth is docs/guide.html at the repo root;
# scripts/sync-docs.sh copies it before each publish to keep them in sync.
